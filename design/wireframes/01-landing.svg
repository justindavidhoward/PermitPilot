  <rect x="860" y="600" width="240" height="80" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="875" y="612" width="32" height="32" rx="8" fill="#FAF5FF"/>
  <text x="920" y="633" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1E293B">Small Developers</text>
  <text x="875" y="660" font-family="Inter, sans-serif" font-size="10" fill="#64748B">Build-outs, permits, occupancy</text>

