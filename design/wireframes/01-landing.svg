  <text x="440" y="845" font-family="Inter, sans-serif" font-size="10" fill="#C7D2FE">Unlimited projects, AI engine</text>

  <rect x="800" y="780" width="300" height="100" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
  <text x="820" y="800" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#64748B" letter-spacing="1">PRO BUILDER</text>
  <text x="820" y="820" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#1E293B">$79 - $199</text>
