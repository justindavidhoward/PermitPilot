  <text x="100" y="800" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#64748B" letter-spacing="1">ONE-OFF BUILDER</text>
  <text x="100" y="820" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#1E293B">$49 - $149</text>
  <text x="185" y="820" font-family="Inter, sans-serif" font-size="11" fill="#64748B">/ project</text>
  <text x="100" y="845" font-family="Inter, sans-serif" font-size="10" fill="#64748B">Single-use permit package</text>
  <rect x="100" y="860" width="260" height="0" stroke="#E2E8F0" stroke-width="1"/>

  <rect x="420" y="770" width="340" height="110" rx="10" fill="#312E81" stroke="#4F46E5" stroke-width="2" transform="scale(1.02)"/>
