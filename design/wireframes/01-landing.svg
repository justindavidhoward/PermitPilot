  <text x="548" y="775" font-family="Inter, sans-serif" font-size="8" font-weight="800" fill="#1E293B">MOST POPULAR</text>
  <text x="440" y="798" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#A5B4FC" letter-spacing="1">HOMEOWNER / DIY</text>
  <text x="440" y="818" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#fff">$19 - $49</text>
