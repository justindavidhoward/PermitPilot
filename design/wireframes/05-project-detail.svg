  <rect x="775" y="450" width="240" height="38" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="790" y="467" font-family="Inter, sans-serif" font-size="10" fill="#475569">📄 structural_joist_drawings.dwg</text>
