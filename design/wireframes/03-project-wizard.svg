<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" fill="none">
  <rect width="800" height="650" fill="#F8FAFC"/>
  <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#94A3B8" letter-spacing="2">WIREFRAME — PROJECT WIZARD (STEP 1 OF 3)</text>

  <!-- Progress bar -->
  <rect x="100" y="70" width="600" height="40" rx="0"/>
  <text x="100" y="88" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#64748B" letter-spacing="1">STEP 1 OF 3</text>
  <text x="630" y="88" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#64748B">Project Type &amp; Location</text>
  <rect x="100" y="98" width="600" height="6" rx="3" fill="#E2E8F0"/>
  <rect x="100" y="98" width="200" height="6" rx="3" fill="#4F46E5"/>

  <!-- Card -->
  <rect x="100" y="120" width="600" height="480" rx="16" fill="#fff" stroke="#E2E8F0" stroke-width="1" filter="drop-shadow(0 8px 12px rgba(0,0,0,0.06))"/>

  <!-- Step 1 Content -->
  <rect x="130" y="145" width="540" height="1" fill="#F1F5F9"/>
  <text x="130" y="175" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#1E293B">What are you building?</text>
  <text x="130" y="195" font-family="Inter, sans-serif" font-size="13" fill="#64748B">Tell us the type and general location of your build.</text>

  <!-- Project Type Grid -->
  <text x="130" y="230" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#475569">Project Type</text>

  <!-- Type buttons -->
  <rect x="130" y="245" width="115" height="60" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <rect x="150" y="258" width="18" height="18" rx="4" fill="#6366F1"/>
  <text x="155" y="288" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#4338CA">Deck</text>

  <rect x="260" y="245" width="115" height="60" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="280" y="258" width="18" height="18" rx="4" fill="#6366F1" opacity="0.5"/>
  <text x="283" y="288" font-family="Inter, sans-serif" font-size="13" fill="#64748B">Garage</text>

  <rect x="390" y="245" width="115" height="60" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="410" y="258" width="18" height="18" rx="4" fill="#6366F1" opacity="0.5"/>
  <text x="418" y="288" font-family="Inter, sans-serif" font-size="13" fill="#64748B">Pool</text>

  <rect x="520" y="245" width="115" height="60" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="540" y="258" width="18" height="18" rx="4" fill="#6366F1" opacity="0.5"/>
  <text x="533" y="288" font-family="Inter, sans-serif" font-size="13" fill="#64748B">Renovation</text>

  <!-- Project Name -->
  <text x="130" y="340" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#475569">Project Identifier Name</text>
  <rect x="130" y="350" width="540" height="36" rx="6" fill="#fff" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="145" y="372" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8">e.g. Backyard Deck, Detached Garage Workshop</text>

  <!-- Location -->
  <text x="130" y="420" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#475569">Location</text>
  
  <!-- State select -->
  <rect x="130" y="430" width="165" height="36" rx="6" fill="#fff" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="145" y="452" font-family="Inter, sans-serif" font-size="11" fill="#475569">Texas (TX) ▼</text>

  <!-- City input -->
  <rect x="315" y="430" width="165" height="36" rx="6" fill="#fff" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="330" y="452" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8">Austin</text>

  <!-- Zip input -->
  <rect x="500" y="430" width="170" height="36" rx="6" fill="#fff" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="515" y="452" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8">78701</text>

  <!-- Footer buttons -->
  <rect x="130" y="530" width="540" height="1" fill="#F1F5F9"/>

  <!-- Back (hidden/disabled) -->
  <rect x="130" y="550" width="100" height="36" rx="8" fill="#fff" stroke="#E2E8F0" stroke-width="1.5" opacity="0.5"/>
  <text x="155" y="573" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#94A3B8">Back</text>

  <!-- Next -->
  <rect x="530" y="550" width="140" height="36" rx="8" fill="#4F46E5"/>
  <text x="555" y="573" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#fff">Next Step →</text>
</svg>